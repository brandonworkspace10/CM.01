<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow1" cx="75%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#C17B3F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0E0D0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="85%" r="40%">
      <stop offset="0%" stop-color="#C17B3F" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0E0D0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0E0D0B"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <g opacity="0.08" stroke="#F6F2EB" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(72, 64)">
    <rect x="0" y="0" width="44" height="44" rx="10" stroke="#F6F2EB" stroke-opacity="0.3" stroke-width="1.5" fill="none"/>
    <path d="M13 17 Q13 13 17 13 L20 13 L24 21 L20 24 Q23 29 27 31 L30 28 L38 31 L38 34 Q38 38 34 38 Q22 38 13 29 Q10 24 10 19 Z" fill="#C17B3F"/>
    <circle cx="34" cy="10" r="3.5" fill="#C17B3F"/>
  </g>

  <!-- Brand name -->
  <text x="130" y="97" font-family="Georgia, serif" font-size="28" font-style="italic" fill="#F6F2EB" letter-spacing="-0.5">Calling Matrix</text>

  <!-- Live badge -->
  <g transform="translate(72, 130)">
    <rect width="140" height="30" rx="15" fill="none" stroke="#2A2620" stroke-width="1"/>
    <circle cx="20" cy="15" r="5" fill="#C17B3F"/>
    <text x="34" y="20" font-family="monospace" font-size="11" fill="#6E685F" letter-spacing="2">LIVE · 24/7</text>
  </g>

  <!-- Main headline -->
  <text x="72" y="290" font-family="Georgia, serif" font-size="82" font-weight="400" fill="#F6F2EB" letter-spacing="-2">Never miss another</text>
  <text x="72" y="385" font-family="Georgia, serif" font-size="82" font-weight="400" font-style="italic" fill="#C17B3F" letter-spacing="-2">service call.</text>

  <!-- Subtext -->
  <text x="72" y="450" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#A6A097">24/7 AI Receptionist built for HVAC, Plumbing, Electrical &amp; Roofing businesses.</text>

  <!-- Divider -->
  <line x1="72" y1="490" x2="1128" y2="490" stroke="#2A2620" stroke-width="1"/>

  <!-- Stats row -->
  <g transform="translate(72, 530)">
    <text font-family="Georgia, serif" font-size="38" fill="#C17B3F">100%</text>
    <text y="30" font-family="monospace" font-size="10" fill="#6E685F" letter-spacing="2">CALLS ANSWERED</text>
  </g>
  <g transform="translate(340, 530)">
    <text font-family="Georgia, serif" font-size="38" fill="#C17B3F">&lt;2s</text>
    <text y="30" font-family="monospace" font-size="10" fill="#6E685F" letter-spacing="2">PICK-UP TIME</text>
  </g>
  <g transform="translate(560, 530)">
    <text font-family="Georgia, serif" font-size="38" fill="#C17B3F">37%</text>
    <text y="30" font-family="monospace" font-size="10" fill="#6E685F" letter-spacing="2">MORE BOOKINGS</text>
  </g>
  <g transform="translate(800, 530)">
    <text font-family="Georgia, serif" font-size="38" fill="#C17B3F">48h</text>
    <text y="30" font-family="monospace" font-size="10" fill="#6E685F" letter-spacing="2">TO GO LIVE</text>
  </g>

  <!-- Domain -->
  <text x="1128" y="580" font-family="monospace" font-size="14" fill="#6E685F" text-anchor="end" letter-spacing="1">callingmatrix.com</text>
